<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso a Inti Raymi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/auto.css">
</head>
<body class="auth-page" style="overflow-y: auto; overflow-x: hidden; min-height: 100vh;">
    <!-- Fondo animado -->
    <div class="auth-background">
        <div class="floating-orbs"></div>
    </div>

    <!-- Navegación minimal -->
    <nav class="navbar auth-nav">
        <div class="nav-brand">
            <span class="logo">☀️</span>
            <h1>Inti Raymi</h1>
        </div>
        <a href="index.html" class="btn-back">← Volver</a>
    </nav>

    <main class="auth-main" style="min-height: auto; padding: 120px 20px 60px;">
        <div class="auth-container luxury">
            <div class="auth-header">
                <h2 class="elegant-title">Bienvenido</h2>
                <p class="subtitle">inicie Sesión o resgistrese</p>
                <div class="divider-elegant">
                    <span>❖</span>
                </div>
            </div>

            <div class="auth-tabs luxury-tabs">
                <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
                <button class="tab-btn" data-tab="register">Registrarse</button>
            </div>

            <!-- Formulario Login -->
            <form id="loginForm" class="auth-form active">
                <div class="input-group luxury-input">
                    <input type="email" id="loginEmail" required placeholder=" ">
                    <label>Correo Electrónico</label>
                    <span class="input-line"></span>
                </div>
                <div class="input-group luxury-input">
                    <input type="password" id="loginPassword" required placeholder=" ">
                    <label>Contraseña</label>
                    <span class="input-line"></span>
                </div>
                
                <div class="role-selector luxury-role">
                    <label class="role-label">Acceder como</label>
                    <div class="role-options">
                        <label class="role-option">
                            <input type="radio" name="role" value="cliente" checked>
                            <span class="role-icon">👤</span>
                            <span class="role-text">Cliente</span>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="admin">
                            <span class="role-icon">👑</span>
                            <span class="role-text">Administrador</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-submit luxury-btn">
                    <span>Ingresar</span>
                    <div class="btn-shine"></div>
                </button>
                <p class="auth-error" id="loginError"></p>
            </form>

            <!-- Formulario Registro -->
            <form id="registerForm" class="auth-form">
                <div class="input-group luxury-input">
                    <input type="text" id="regNombre" required placeholder=" ">
                    <label>Nombre Completo</label>
                    <span class="input-line"></span>
                </div>
                <div class="input-group luxury-input">
                    <input type="email" id="regEmail" required placeholder=" ">
                    <label>Correo Electrónico</label>
                    <span class="input-line"></span>
                </div>
                <div class="input-group luxury-input">
                    <input type="tel" id="regTelefono" required placeholder=" ">
                    <label>Teléfono</label>
                    <span class="input-line"></span>
                </div>
                <div class="input-group luxury-input">
                    <input type="password" id="regPassword" required placeholder=" ">
                    <label>Contraseña</label>
                    <span class="input-line"></span>
                </div>

                <button type="submit" class="btn-submit luxury-btn">
                    <span>Crear Cuenta</span>
                    <div class="btn-shine"></div>
                </button>
                <p class="auth-error" id="regError"></p>
            </form>

            <!-- Divider elegante -->
            <div class="auth-divider luxury-divider">
                <span class="divider-line"></span>
                <span class="divider-text">O continúa con</span>
                <span class="divider-line"></span>
            </div>

            <!-- Botones Sociales de Lujo -->
            <div class="social-login luxury-social">
                <button id="btnGoogle" class="social-btn google luxury-social-btn">
                    <div class="social-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                    </div>
                    <span>Google</span>
                </button>

                <button id="btnGithub" class="social-btn github luxury-social-btn">
                    <div class="social-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </div>
                    <span>GitHub</span>
                </button>

                <button id="btnTwitter" class="social-btn twitter luxury-social-btn">
                    <div class="social-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                    </div>
                    <span>X (Twitter)</span>
                </button>
            </div>

            <p class="auth-footer">
                Al ingresar, aceptas nuestros <a href="#">Términos de Servicio</a> y <a href="#">Política de Privacidad</a>
            </p>
        </div>
    </main>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
